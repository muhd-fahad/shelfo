name: shelfo
description: "Shelfo is an category and repair management system"

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.0


dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # image
  flutter_svg: ^2.2.4

  # state management
  provider: ^6.1.5+1

  # data base
  hive_ce: ^2.19.3
  hive_ce_flutter: ^2.3.4


dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

  hive_ce_generator: ^1.11.1
  build_runner: ^2.12.2

# The following section is specific to Flutter packages.
flutter:


  uses-material-design: true

  assets:
    - assets/images/
    - assets/logo/


  # custom fonts
  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter_18pt-Thin.ttf
          weight: 100
        - asset: assets/fonts/Inter_18pt-ExtraLight.ttf
          weight: 200
        - asset: assets/fonts/Inter_18pt-Light.ttf
          weight: 300
        - asset: assets/fonts/Inter_18pt-Regular.ttf
          weight: 400
        - asset: assets/fonts/Inter_18pt-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter_18pt-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Inter_18pt-Bold.ttf
          weight: 700
        - asset: assets/fonts/Inter_18pt-ExtraBold.ttf
          weight: 800
        - asset: assets/fonts/Inter_18pt-Black.ttf
          weight: 900
        - asset: assets/fonts/Inter_18pt-Italic.ttf
          style: italic
